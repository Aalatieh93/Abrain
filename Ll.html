<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Brain - Gemini AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            display: flex;
            justify-content: flex-end;
        }

        .user-message .text {
            background: #667eea;
            color: white;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            display: flex;
            justify-content: flex-start;
        }

        .bot-message .text {
            background: white;
            color: #333;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
            border-radius: 0 0 20px 20px;
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            padding: 12px 18px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 15px;
            border: 1px solid #fcc;
        }

        /* Mobile optimization */
        @media (max-width: 600px) {
            .container {
                border-radius: 0;
                height: 100vh;
                max-height: none;
            }

            .header {
                border-radius: 0;
            }

            .header h1 {
                font-size: 24px;
            }

            .user-message .text,
            .bot-message .text {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Ahmad Brain</h1>
            <p>Powered by Google Gemini AI</p>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <input 
                type="text" 
                class="input-field" 
                id="messageInput" 
                placeholder="اكتب سؤالك هنا... Type your question..."
                autocomplete="off"
            >
            <button class="send-btn" id="sendBtn" title="Send">
                ➤
            </button>
        </div>
    </div>

    <script>
        const API_KEY = 'AQ.Ab8RN6KW6L73jkszX1stsZEjZOmm3enfJw-xmau_IUTOQX17cQ';
        const PROJECT_ID = '420596237345';
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        let isLoading = false;

        // Send message on button click
        sendBtn.addEventListener('click', sendMessage);

        // Send message on Enter key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.focus();

            // Show loading state
            isLoading = true;
            sendBtn.disabled = true;
            const loadingId = showLoading();

            try {
                // Call Gemini API
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/projects/${PROJECT_ID}/location/global/generativeModels/gemini-1.5-flash:generateContent?key=${API_KEY}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            contents: [
                                {
                                    parts: [
                                        {
                                            text: message
                                        }
                                    ]
                                }
                            ]
                        })
                    }
                );

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();

                // Extract the response text
                const botResponse = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'عذراً، لم أتمكن من الحصول على رد.';

                // Remove loading and add bot message
                removeLoading(loadingId);
                addMessage(botResponse, 'bot');

            } catch (error) {
                console.error('Error:', error);
                removeLoading(loadingId);
                addMessage(`❌ خطأ: ${error.message}`, 'error');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, type) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}-message`;

            const textEl = document.createElement('div');
            textEl.className = 'text';
            textEl.textContent = text;

            messageEl.appendChild(textEl);
            chatBox.appendChild(messageEl);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const id = Date.now();
            const messageEl = document.createElement('div');
            messageEl.id = `loading-${id}`;
            messageEl.className = 'message bot-message';

            const loadingEl = document.createElement('div');
            loadingEl.className = 'loading';
            loadingEl.innerHTML = '<span></span><span></span><span></span>';

            messageEl.appendChild(loadingEl);
            chatBox.appendChild(messageEl);
            chatBox.scrollTop = chatBox.scrollHeight;

            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(`loading-${id}`);
            if (el) el.remove();
        }

        // Focus input on load
        window.addEventListener('load', () => {
            messageInput.focus();
        });
    </script>
</body>
</html>
